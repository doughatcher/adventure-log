<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
<style>
:root {
  --bg: #0d0f12;
  --surface: #141920;
  --surface2: #1c2430;
  --border: #2a3540;
  --text: #d4c5a9;
  --text2: #a89880;
  --text3: #6a7880;
  --accent: #8b3a2a;
  --accent2: #c4602a;
  --hp-fill: #2a6a3a;
  --hp-low: #8b3a2a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: Georgia, 'Times New Roman', serif;
  line-height: 1.7;
  min-height: 100vh;
}
a { color: var(--accent2); text-decoration: none; }
a:hover { text-decoration: underline; }
h1, h2, h3, h4 {
  font-family: 'Courier New', monospace;
  color: var(--text);
  letter-spacing: 0.04em;
}
h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
h2 { font-size: 1.3rem; margin: 1.5rem 0 0.5rem; }
h3 { font-size: 1.1rem; margin: 1rem 0 0.25rem; color: var(--text2); }
p { margin-bottom: 1rem; }
ul, ol { margin: 0 0 1rem 1.5rem; }
li { margin-bottom: 0.25rem; }
code { font-family: 'Courier New', monospace; font-size: 0.9em; background: var(--surface2); padding: 1px 4px; border-radius: 3px; }
hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

/* Layout */
nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  min-height: 48px;
  flex-wrap: wrap;
}
nav .site-title {
  font-family: 'Courier New', monospace;
  font-size: 1rem;
  font-weight: bold;
  color: var(--text);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
}
nav .site-title span { color: var(--accent2); }
nav a { color: var(--text3); font-family: 'Courier New', monospace; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; }
nav a:hover { color: var(--text); text-decoration: none; }
nav .sep { flex: 1; }
@media (max-width: 480px) {
  nav { padding: 0.5rem 1rem; gap: 1rem; }
  nav .github-link { display: none; }
}

main {
  max-width: 860px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 4rem;
}

footer {
  text-align: center;
  padding: 1.5rem;
  color: var(--text3);
  font-family: 'Courier New', monospace;
  font-size: 0.75rem;
  border-top: 1px solid var(--border);
}

/* Session list */
.session-list { list-style: none; margin: 0; }
.session-item {
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 4px;
  padding: 1rem 1.25rem;
  margin-bottom: 0.75rem;
  transition: border-color 0.15s;
}
.session-item:hover { border-color: var(--accent); }
.session-item .session-title { font-family: 'Courier New', monospace; font-size: 1rem; font-weight: bold; }
.session-item .session-meta { font-size: 0.8rem; color: var(--text3); margin-top: 0.25rem; }

/* Character grid */
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1rem;
  margin-top: 1.5rem;
}
.char-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1rem;
}
.char-card:hover { border-color: var(--accent); }
.char-name { font-family: 'Courier New', monospace; font-size: 0.95rem; font-weight: bold; margin-bottom: 0.25rem; }
.char-class { font-size: 0.8rem; color: var(--text3); margin-bottom: 0.75rem; }
.hp-bar-wrap { background: var(--surface2); border-radius: 2px; height: 6px; overflow: hidden; }
.hp-bar-fill { height: 100%; background: var(--hp-fill); border-radius: 2px; transition: width 0.3s; }
.hp-bar-fill.low { background: var(--hp-low); }
.hp-label { font-size: 0.75rem; color: var(--text3); margin-top: 0.3rem; }
.char-status { display: inline-block; font-size: 0.7rem; font-family: 'Courier New', monospace; padding: 1px 6px; border-radius: 10px; margin-top: 0.5rem; background: var(--surface2); color: var(--text3); }
.char-status.dead { background: #3a1010; color: #c04040; }
.char-status.unconscious { background: #2a2030; color: #8060a0; }

/* Article / single page */
article .content { max-width: 680px; }
article .meta {
  font-family: 'Courier New', monospace;
  font-size: 0.8rem;
  color: var(--text3);
  margin-bottom: 1.5rem;
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}
article .meta span { display: flex; align-items: center; gap: 0.25rem; }

/* Char page sidebar */
.char-page { display: grid; grid-template-columns: 1fr 220px; gap: 2rem; }
.char-page .sidebar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1.25rem;
  height: fit-content;
  font-family: 'Courier New', monospace;
  font-size: 0.85rem;
}
.char-page .sidebar dt { color: var(--text3); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.75rem; }
.char-page .sidebar dd { color: var(--text); margin-top: 0.1rem; }
.char-page .sidebar .stat-row { display: flex; gap: 1rem; margin-top: 0.75rem; }
.char-page .sidebar .stat { text-align: center; }
.char-page .sidebar .stat .val { font-size: 1.5rem; font-weight: bold; color: var(--text); }
.char-page .sidebar .stat .lbl { font-size: 0.65rem; color: var(--text3); text-transform: uppercase; }
@media (max-width: 600px) { .char-page { grid-template-columns: 1fr; } }

/* Section header */
.section-header { margin-bottom: 2rem; }
.section-header p { color: var(--text3); font-size: 0.95rem; }

/* Home hero */
.home-hero { margin-bottom: 3rem; }
.home-hero .tagline { color: var(--text3); font-family: 'Courier New', monospace; font-size: 0.9rem; margin-top: 0.5rem; }
.home-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem; }
@media (max-width: 600px) { .home-sections { grid-template-columns: 1fr; } }
.home-section h2 { margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 1rem; }
.home-section .more { font-family: 'Courier New', monospace; font-size: 0.8rem; color: var(--text3); display: block; margin-top: 0.75rem; }
</style>
